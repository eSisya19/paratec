<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download ParasJC - Mobile Experience</title>
    <meta name="description" content="Download the professional ParasJC app for a seamless mobile experience.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --accent-primary: #00f2ff;
            --accent-secondary: #bc00ff;
            --text-main: #ffffff;
            --text-dim: #a0a0c0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(188, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--glass-border);
            object-fit: cover;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(188, 0, 255, 0.3);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn i {
            margin-right: 10px;
        }

        .version-tag {
            margin-top: 24px;
            display: inline-block;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: var(--text-dim);
            opacity: 0.7;
        }

        /* Micro-animations */
        .pulse {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <img src="app_icon.png" alt="ParasJC Icon" class="app-icon">
        <h1>ParasJC</h1>
        <p>Your one-stop mobile solution. Seamlessly connected, beautifully designed, and built for speed.</p>
        
        <a href="parasjc-app.apk" class="download-btn pulse" id="downloadBtn" download>
            <span>Download for Android</span>
        </a>

        <div class="version-tag">Version 1.0.0 (Latest)</div>
    </div>

    <footer>
        &copy; 2026 ParasJC. All rights reserved.
    </footer>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            const btn = this;
            const originalText = btn.innerHTML;
            
            // Subtle feedback on click
            btn.innerHTML = '<span>Starting Download...</span>';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 3000);
        });

        // Add a subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.container').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
